name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  deterministic-evals:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install test dependencies on Ubuntu
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y jq ripgrep perl shellcheck
      - name: Install test dependencies on macOS
        if: runner.os == 'macOS'
        run: brew install jq ripgrep shellcheck
      - name: Validate shell syntax
        run: |
          bash -n scripts/install.sh
          bash -n skill/codex-advisor/scripts/run-role.sh
          bash -n evals/fake-bin/codex
      - name: Lint shell scripts
        run: shellcheck scripts/install.sh skill/codex-advisor/scripts/run-role.sh evals/fake-bin/codex
      - name: Run release gate
        run: python3 evals/evaluate.py deterministic --output /tmp/deterministic.json
